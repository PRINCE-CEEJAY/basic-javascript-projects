<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex flex-col justify-center items-center min-h-screen bg-amber-900/20">
    <h1 class="text-3xl font-bold text-center">COUNTER</h1>
    <div class=" p-6 flex flex-col items-center justify-center bg-black/60 h-md rounded-lg">        
        <h1 class="text-5xl font-extrabold scale-200 mb-3" id="counter">0</h1>
        <div class="w-[500px] flex justify-evenly mt-2 space-x-6">
            <button class="btn btn-minus text-7xl px-2 rounded-md cursor-pointer hover:bg-gray-500"> - </button>
            <button class="btn btn-reset text-4xl px-2 rounded-md cursor-pointer hover:bg-red-500"> Reset </button>
            <button class="btn btn-plus text-7xl px-2 rounded-md cursor-pointer hover:bg-gray-500"> + </button>
        </div>
    </div>

    <script src="counter.js"></script>
</body>
</html>
